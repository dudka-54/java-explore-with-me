version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: explore-postgres
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stats"]
      interval: 10s
      timeout: 5s
      retries: 5

  stats-server:
    build:
      context: .
      dockerfile: ewm-stats-service/stats-server/Dockerfile
    container_name: explore-stats-server
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stats
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SERVER_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy


  main-server:
    build:
      context: .
      dockerfile: ewm-main-service/main-server/Dockerfile
    container_name: explore-main-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/main
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SERVER_PORT: 8080
      STATS_SERVER_URL: http://stats-server:9090
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: